<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let logs = JSON.parse(localStorage.getItem("logs")) || {};
let currentUser = null;

// récupérer les éléments
const loginDiv = document.getElementById("login");
const registerDiv = document.getElementById("register");
const appDiv = document.getElementById("app");

// champs login
const matriculeInput = document.getElementById("matricule");
const passwordInput = document.getElementById("password");

// champs register
const rNom = document.getElementById("r_nom");
const rPrenom = document.getElementById("r_prenom");
const rMatricule = document.getElementById("r_matricule");
const rPassword = document.getElementById("r_password");

// affichage
const userInfo = document.getElementById("userInfo");
const logDiv = document.getElementById("log");

// navigation
function showRegister() {
  loginDiv.style.display = "none";
  registerDiv.style.display = "block";
}

function showLogin() {
  registerDiv.style.display = "none";
  loginDiv.style.display = "block";
}

// inscription
function register() {
  if (!rNom.value || !rPrenom.value || !rMatricule.value || !rPassword.value) {
    alert("Remplis tous les champs");
    return;
  }

  if (users.find(u => u.matricule === rMatricule.value)) {
    alert("Matricule déjà utilisé");
    return;
  }

  let user = {
    nom: rNom.value,
    prenom: rPrenom.value,
    matricule: rMatricule.value,
    password: rPassword.value
  };

  users.push(user);
  localStorage.setItem("users", JSON.stringify(users));

  alert("Compte créé !");
  showLogin();
}

// connexion
function login() {
  let m = matriculeInput.value;
  let p = passwordInput.value;

  if (m === "admin" && p === "admin") {
    currentUser = { admin: true };
  } else {
    currentUser = users.find(u => u.matricule === m && u.password === p);
  }

  if (!currentUser) {
    alert("Identifiants incorrects");
    return;
  }

  loginDiv.style.display = "none";
  appDiv.style.display = "block";

  userInfo.innerText = currentUser.admin
    ? "ADMIN"
    : currentUser.prenom + " " + currentUser.nom;

  afficher();
}

// ===== POINTEUSE =====
let actif = false;
let debutTime;
let chronoInterval;

function toggle() {
  let now = new Date();

  if (!actif) {
    debutTime = now;
    actif = true;
    document.getElementById("switch").classList.add("active");
    document.getElementById("status").innerText = "En service";

    chronoInterval = setInterval(() => {
      let diff = Math.floor((new Date() - debutTime) / 1000);
      let m = Math.floor(diff / 60);
      let s = diff % 60;
      document.getElementById("chrono").innerText =
        String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }, 1000);

  } else {
    clearInterval(chronoInterval);
    actif = false;
    document.getElementById("switch").classList.remove("active");
    document.getElementById("status").innerText = "Hors service";

    let diff = Math.floor((now - debutTime) / 60000);
    if (diff < 1) return;

    let key = currentUser.admin ? "admin" : currentUser.matricule;

    if (!logs[key]) logs[key] = [];

    logs[key].push({
      debut: debutTime.toLocaleString(),
      fin: now.toLocaleString(),
      duree: diff
    });

    save();
    afficher();
  }
}

// ajout manuel
function ajoutManuel() {
  let d = new Date(document.getElementById("debut").value);
  let f = new Date(document.getElementById("fin").value);

  let diff = Math.floor((f - d) / 60000);
  if (diff < 1) return;

  let key = currentUser.admin ? "admin" : currentUser.matricule;

  if (!logs[key]) logs[key] = [];

  logs[key].push({
    debut: d.toLocaleString(),
    fin: f.toLocaleString(),
    duree: diff
  });

  save();
  afficher();
}

// sauvegarde
function save() {
  localStorage.setItem("logs", JSON.stringify(logs));
}

// affichage
function afficher() {
  let html = "<h3>Historique</h3>";

  if (currentUser.admin) {
    for (let user in logs) {
      html += `<h4>${user}</h4>`;
      logs[user].forEach(l => {
        html += `<p>${l.debut} → ${l.fin} (${l.duree} min)</p>`;
      });
    }
  } else {
    let userLogs = logs[currentUser.matricule] || [];
    userLogs.slice().reverse().forEach(l => {
      html += `<p>${l.debut} → ${l.fin} (${l.duree} min)</p>`;
    });
  }

  logDiv.innerHTML = html;
}
</script>
